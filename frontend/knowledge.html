<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ariadne Knowledge</title>
  <style>
    :root {
      --bg-1: #f7fbfa;
      --bg-2: #ecf4f3;
      --panel: rgba(253, 255, 254, 0.84);
      --line: rgba(120, 149, 155, 0.18);
      --text: #24343c;
      --muted: #6d8088;
      --accent: #6d9f96;
      --accent-2: #8fbeca;
      --shadow: 0 16px 34px rgba(48, 42, 30, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font: 14px/1.6 "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background:
        radial-gradient(900px 420px at -10% -10%, rgba(109, 159, 150, 0.14), transparent 60%),
        radial-gradient(900px 420px at 110% -10%, rgba(143, 190, 202, 0.12), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .layout {
      position: fixed;
      inset: 0;
    }

    .nav {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 270px;
      padding: 14px 10px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(253, 255, 254, 0.9), rgba(244, 249, 248, 0.94));
      box-shadow: 10px 0 26px rgba(48, 42, 30, 0.06);
      overflow: auto;
      z-index: 20;
    }

    .brand {
      font-weight: 700;
      letter-spacing: .2px;
      margin: 0 2px 12px;
      color: var(--text);
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.74);
      padding: 10px;
      margin-bottom: 8px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      text-align: left;
    }

    .btn:hover { border-color: rgba(143, 190, 202, 0.42); background: rgba(232, 243, 246, 0.72); }

    .btn.primary {
      border-color: transparent;
      color: #f5fbfa;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .main {
      position: fixed;
      left: 286px;
      right: 396px;
      top: 12px;
      bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(253, 255, 254, 0.88), rgba(243, 248, 247, 0.92));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.74);
      overflow: hidden;
      z-index: 10;
    }

    .main-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.74);
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }

    .status.warn { color: #7f6163; }

    .viewer {
      width: 100%;
      height: calc(100% - 58px);
      border: none;
      background: #fff;
    }

    .chat-side {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 380px;
      border-left: 1px solid var(--line);
      background: rgba(245, 250, 249, 0.84);
      box-shadow: -10px 0 28px rgba(48, 42, 30, 0.06);
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    .chat-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(420px 120px at 15% -30%, rgba(109, 159, 150, 0.12), transparent 70%),
        radial-gradient(380px 120px at 90% -20%, rgba(143, 190, 202, 0.10), transparent 72%),
        rgba(255, 255, 255, 0.78);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .chat-title { font-size: 15px; font-weight: 700; color: #24343c; }
    .chat-sub { margin-top: 2px; font-size: 11px; color: #6d8088; }

    .chat-head-right {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .chat-icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
    }

    .chat-icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chat-icon-btn svg {
      width: 14px;
      height: 14px;
    }

    .chat-icon-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .chat-history-panel {
      border-bottom: 1px solid var(--line);
      background: rgba(241, 247, 247, 0.8);
      max-height: 200px;
      overflow: hidden;
      display: none;
    }

    .chat-history-panel.open {
      display: block;
    }

    .chat-history-list {
      padding: 8px;
      overflow-y: auto;
      max-height: 200px;
    }

    .history-item {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      transition: background 0.15s ease;
    }

    .history-item:hover {
      background: rgba(109, 159, 150, 0.08);
    }

    .history-item.active {
      background: var(--accent);
      color: #fff;
    }

    .history-item-title {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-time {
      font-size: 11px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .history-empty {
      padding: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .new-chat-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;
      display: none;
    }

    .new-chat-badge.show { display: block; }

    .chat-list {
      flex: 1;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: linear-gradient(180deg, rgba(244, 249, 248, 0.92), rgba(238, 245, 246, 0.96));
    }

    .msg {
      max-width: 92%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.84);
      color: #304049;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(48, 42, 30, 0.05);
    }

    .msg:not(.user) {
      white-space: normal;
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(231, 243, 240, 0.92);
      border-color: rgba(150, 188, 180, 0.5);
      color: #315560;
    }

    .msg.system-tip {
      align-self: center;
      background: rgba(229, 241, 245, 0.92);
      border-color: rgba(156, 190, 202, 0.5);
      color: #52707b;
      font-size: 12px;
      text-align: center;
      max-width: 95%;
    }

    .msg-markdown {
      color: inherit;
      font-size: 13px;
      line-height: 1.65;
    }

    .msg-markdown > *:first-child { margin-top: 0; }
    .msg-markdown > *:last-child { margin-bottom: 0; }

    .msg-markdown p {
      margin: 0 0 10px;
      color: #31424a;
    }

    .msg-markdown ul,
    .msg-markdown ol {
      margin: 0 0 10px 18px;
      padding-left: 6px;
    }

    .msg-markdown li {
      margin: 4px 0;
      color: #31424a;
    }

    .msg-markdown strong {
      color: #27404a;
      font-weight: 700;
    }

    .msg-markdown em {
      color: #466772;
    }

    .msg-markdown code {
      background: rgba(222, 238, 242, 0.92);
      border: 1px solid rgba(143, 190, 202, 0.28);
      border-radius: 6px;
      padding: 1px 5px;
      color: #34515c;
      font-size: 12px;
    }

    .msg-markdown pre {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(136, 166, 172, 0.22);
      background: rgba(235, 243, 245, 0.96);
      white-space: pre-wrap;
      overflow-x: auto;
      color: #31424a;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    .msg-markdown pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 12px;
    }

    .msg-markdown blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 3px solid rgba(109, 159, 150, 0.48);
      background: rgba(237, 245, 244, 0.88);
      color: #4a646d;
      border-radius: 0 10px 10px 0;
    }

    .msg-markdown table {
      width: 100%;
      margin: 10px 0;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid rgba(136, 166, 172, 0.2);
      border-radius: 10px;
      overflow: hidden;
      font-size: 12px;
      display: block;
      overflow-x: auto;
    }

    .msg-markdown th,
    .msg-markdown td {
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      border-right: 1px solid rgba(136, 166, 172, 0.16);
      border-bottom: 1px solid rgba(136, 166, 172, 0.16);
      min-width: 88px;
      color: #31424a;
      background: rgba(255, 255, 255, 0.72);
    }

    .msg-markdown th:last-child,
    .msg-markdown td:last-child { border-right: none; }
    .msg-markdown tr:last-child td { border-bottom: none; }

    .msg-markdown th {
      background: rgba(232, 243, 246, 0.94);
      color: #29424b;
      font-weight: 700;
    }

    .msg-markdown a {
      color: #4e87a1;
      text-decoration: underline;
      text-decoration-color: rgba(78, 135, 161, 0.35);
      text-underline-offset: 2px;
    }

    .chat-input {
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .chat-input textarea {
      min-height: 64px;
      max-height: 132px;
      resize: none;
      border: 1px solid rgba(136, 166, 172, 0.24);
      border-radius: 10px;
      padding: 8px 9px;
      font: inherit;
      color: #304049;
      background: rgba(255, 255, 255, 0.82);
    }

    .chat-input textarea:focus {
      outline: none;
      border-color: rgba(143, 190, 202, 0.48);
      box-shadow: 0 0 0 3px rgba(143, 190, 202, 0.14);
    }

    .send {
      min-width: 82px;
      border: none;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .nav { width: 220px; }
      .main { left: 236px; }
      .chat-side { width: 300px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="nav">
      <div class="brand">Ariadne Shell</div>
      <div class="card">
        <div>当前页面</div>
        <div class="meta" id="meta">courseware_id=</div>
      </div>
      <button id="backBtn" class="btn" type="button">返回首页</button>
      <button id="refreshBtn" class="btn primary" type="button">刷新内容</button>
      <button id="openTabBtn" class="btn" type="button">新标签页打开</button>
      <div class="card" style="margin-top:10px;">
        <div style="font-size:12px;color:var(--muted)">固定壳层说明</div>
        <div class="meta">左导航与右侧聊天栏属于项目固定壳层；中间区域根据课件内容动态渲染。</div>
      </div>
    </aside>

    <main class="main">
      <div class="main-head">
        <h1 class="title">Interactive Knowledge</h1>
        <div id="status" class="status">正在加载...</div>
      </div>
      <iframe id="viewer" class="viewer" title="Knowledge HTML Viewer"></iframe>
    </main>

    <aside class="chat-side">
      <div class="chat-head">
        <div>
          <div class="chat-title">Chat</div>
          <div class="chat-sub">自动关联文档内容进行对话</div>
        </div>
        <div class="chat-head-right">
          <button id="newChatBtn" class="chat-icon-btn" title="新建对话" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button id="historyToggleBtn" class="chat-icon-btn" title="聊天历史" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8v4l3 3"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
            <span class="new-chat-badge" id="newChatBadge"></span>
          </button>
        </div>
      </div>

      <div id="historyPanel" class="chat-history-panel">
        <div id="historyList" class="chat-history-list">
          <div class="history-empty">暂无历史对话</div>
        </div>
      </div>

      <div id="chatList" class="chat-list">
        <div class="msg">Hi, I am ready. Ask me anything.</div>
        <div class="msg system-tip">我会自动将中间文档的内容加入上下文，你可以直接针对文档内容提问。</div>
      </div>
      <div class="chat-input">
        <textarea id="chatInput" placeholder="针对文档内容提问..."></textarea>
        <button id="chatSendBtn" class="send" type="button">Send</button>
      </div>
    </aside>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const chatState = { sessionId: '', sending: false, sessions: [], historyOpen: false, assetIds: [], coursewareLoaded: false };

    function getCoursewareId() {
      return new URLSearchParams(location.search).get('courseware_id') || '';
    }

    // Load courseware info including source_asset_ids
    async function loadCoursewareInfo() {
      const coursewareId = getCoursewareId();
      if (!coursewareId || chatState.coursewareLoaded) return;

      try {
        const data = await apiJson(`/api/v1/coursewares/${encodeURIComponent(coursewareId)}`);
        if (data.code === 0 && data.data) {
          chatState.assetIds = data.data.source_asset_ids || [];
          chatState.coursewareLoaded = true;
          console.log('Loaded courseware source_asset_ids:', chatState.assetIds);
          // Update UI to show associated files if any
          updateFileInfo();
        }
      } catch (err) {
        console.warn('Failed to load courseware info:', err);
      }
    }

    function updateFileInfo() {
      const metaEl = $('meta');
      if (!metaEl) return;
      const coursewareId = getCoursewareId();
      let metaText = `courseware_id=${coursewareId}`;
      if (chatState.assetIds.length > 0) {
        metaText += ` | 关联文件: ${chatState.assetIds.length} 个`;
      }
      metaEl.textContent = metaText;
    }

    async function apiJson(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      return res.json();
    }

    function formatTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      return (date.getMonth() + 1) + '/' + date.getDate();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function escapeAttr(text) {
      return escapeHtml(text).replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    function sanitizeUrl(url) {
      const value = String(url || '').trim();
      if (!value) return '#';
      return /^https?:\/\//i.test(value) ? value : '#';
    }

    function normalizeMarkdownText(text) {
      return String(text || '')
        .replace(/\r\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '    ');
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(normalizeMarkdownText(text));
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => `<a href="${escapeAttr(sanitizeUrl(href))}" target="_blank" rel="noopener noreferrer">${label}</a>`);
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function renderMarkdownParagraph(text) {
      return `<p>${renderInlineMarkdown(text)}</p>`;
    }

    function renderMarkdownList(lines, ordered = false) {
      const tag = ordered ? 'ol' : 'ul';
      const items = lines.map((line) => {
        const value = ordered ? line.replace(/^\d+\.\s+/, '') : line.replace(/^[-*+]\s+/, '');
        return `<li>${renderInlineMarkdown(value)}</li>`;
      }).join('');
      return `<${tag}>${items}</${tag}>`;
    }

    function renderMarkdownBlockquote(lines) {
      const body = lines
        .map((line) => line.replace(/^>\s?/, '').trim())
        .filter(Boolean)
        .map((line) => `<p>${renderInlineMarkdown(line)}</p>`)
        .join('');
      return `<blockquote>${body || '<p></p>'}</blockquote>`;
    }

    function isMarkdownTable(lines) {
      if (!Array.isArray(lines) || lines.length < 2) return false;
      if (!lines.every((line) => /^\|.*\|$/.test(line.trim()))) return false;
      return /^\|\s*[:\-| ]+\|$/.test(lines[1].trim());
    }

    function renderMarkdownTable(lines) {
      const parseCells = (line) => line.trim().slice(1, -1).split('|').map((cell) => cell.trim());
      const header = parseCells(lines[0]);
      const rows = lines.slice(2).map(parseCells);
      const headHtml = `<thead><tr>${header.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr></thead>`;
      const bodyHtml = rows.length
        ? `<tbody>${rows.map((cells) => `<tr>${cells.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`).join('')}</tbody>`
        : '';
      return `<table>${headHtml}${bodyHtml}</table>`;
    }

    function renderChatMarkdown(text) {
      const raw = normalizeMarkdownText(text);
      if (!raw.trim()) return '';
      const fences = [];
      const placeholderPrefix = '__CODE_BLOCK_';
      const fenced = raw.replace(/```([^\n`]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const token = `${placeholderPrefix}${fences.length}__`;
        const language = String(lang || '').trim();
        const label = language ? ` data-lang="${escapeAttr(language)}"` : '';
        fences.push(`<pre><code${label}>${escapeHtml(code.replace(/\n+$/, '')).replace(/\n/g, '<br>')}</code></pre>`);
        return token;
      });
      const blocks = fenced.split(/\n\s*\n/).map((part) => part.trim()).filter(Boolean);
      const html = blocks.map((block) => {
        const lines = block.split('\n').map((line) => line.trimEnd()).filter((line) => line.trim().length > 0);
        if (!lines.length) return '';
        if (lines.length === 1 && lines[0].startsWith(placeholderPrefix)) return lines[0];
        if (isMarkdownTable(lines)) return renderMarkdownTable(lines);
        if (lines.every((line) => /^>\s?/.test(line))) return renderMarkdownBlockquote(lines);
        if (lines.every((line) => /^[-*+]\s+/.test(line))) return renderMarkdownList(lines, false);
        if (lines.every((line) => /^\d+\.\s+/.test(line))) return renderMarkdownList(lines, true);
        return renderMarkdownParagraph(lines.join('\n'));
      }).join('');
      return fences.reduce((acc, fence, idx) => acc.replace(`${placeholderPrefix}${idx}__`, fence), html);
    }

    function appendChat(role, text) {
      const row = document.createElement('div');
      row.className = role === 'user' ? 'msg user' : 'msg';
      if (role === 'assistant') {
        row.innerHTML = `<div class="msg-markdown">${renderChatMarkdown(text)}</div>`;
      } else {
        row.textContent = text;
      }
      const list = $('chatList');
      list.appendChild(row);
      list.scrollTop = list.scrollHeight;
    }

    function clearChatList() {
      $('chatList').innerHTML = '<div class="msg">Hi, I am ready. Ask me anything.</div><div class="msg system-tip">我会自动将中间文档的内容加入上下文，你可以直接针对文档内容提问。</div>';
    }

    async function loadChatSessions() {
      const coursewareId = getCoursewareId();
      if (!coursewareId) return;

      const data = await apiJson(`/api/v1/chat/sessions?courseware_id=${encodeURIComponent(coursewareId)}`);
      if (data.code === 0 && data.data && data.data.sessions) {
        chatState.sessions = data.data.sessions;
        renderHistoryList();
      }
    }

    function renderHistoryList() {
      const list = $('historyList');
      if (chatState.sessions.length === 0) {
        list.innerHTML = '<div class="history-empty">暂无历史对话</div>';
        return;
      }

      list.innerHTML = chatState.sessions.map(s => `
        <div class="history-item ${s.id === chatState.sessionId ? 'active' : ''}" data-id="${s.id}">
          <div class="history-item-title">${s.title || '新对话'}</div>
          <div class="history-item-time">${formatTime(s.last_active_at || s.created_at)}</div>
        </div>
      `).join('');

      list.querySelectorAll('.history-item').forEach(item => {
        item.addEventListener('click', () => {
          const sessionId = item.dataset.id;
          switchSession(sessionId);
        });
      });
    }

    function toggleHistoryPanel() {
      chatState.historyOpen = !chatState.historyOpen;
      $('historyPanel').classList.toggle('open', chatState.historyOpen);
      $('historyToggleBtn').classList.toggle('active', chatState.historyOpen);
      if (chatState.historyOpen) {
        loadChatSessions();
      }
    }

    async function createNewChat() {
      const coursewareId = getCoursewareId();
      if (!coursewareId) return;

      const data = await apiJson('/api/v1/chat/sessions', {
        method: 'POST',
        body: JSON.stringify({
          courseware_id: coursewareId,
          page_id: 'pg_knowledge_shell',
          chunk_id: '',
        }),
      });

      if (data.code === 0 && data.data && data.data.id) {
        chatState.sessionId = data.data.id;
        clearChatList();
        if (chatState.historyOpen) {
          loadChatSessions();
        }
      }
    }

    async function switchSession(sessionId) {
      chatState.sessionId = sessionId;
      const data = await apiJson(`/api/v1/chat/sessions`, {
        method: 'POST',
        body: JSON.stringify({ session_id: sessionId }),
      });

      if (data.code === 0 && data.data && data.data.messages) {
        $('chatList').innerHTML = '';
        data.data.messages.forEach(msg => {
          appendChat(msg.role, msg.content);
        });
        renderHistoryList();
      }
    }

    async function ensureChatSession() {
      if (chatState.sessionId) return chatState.sessionId;
      const coursewareId = getCoursewareId();
      if (!coursewareId) throw new Error('missing courseware_id');
      const data = await apiJson('/api/v1/chat/sessions', {
        method: 'POST',
        body: JSON.stringify({
          courseware_id: coursewareId,
          page_id: 'pg_knowledge_shell',
          chunk_id: '',
        }),
      });
      if (data.code !== 0 || !data.data || !data.data.id) {
        throw new Error(data.message || 'chat session create failed');
      }
      chatState.sessionId = data.data.id;
      return chatState.sessionId;
    }

    async function sendChat() {
      if (chatState.sending) return;
      const text = ($('chatInput').value || '').trim();
      if (!text) return;
      $('chatInput').value = '';
      appendChat('user', text);
      chatState.sending = true;
      $('chatSendBtn').disabled = true;
      try {
        const sessionId = await ensureChatSession();
        const requestBody = {
          session_id: sessionId,
          message: text,  // Only user's question
        };
        // Include asset_ids if available (for RAG)
        if (chatState.assetIds.length > 0) {
          requestBody.asset_ids = chatState.assetIds;
        }
        const data = await apiJson('/api/v1/chat/messages', {
          method: 'POST',
          body: JSON.stringify(requestBody),
        });
        if (data.code !== 0) {
          appendChat('assistant', `Request failed: ${data.message || 'unknown error'}`);
          return;
        }
        appendChat('assistant', (data.data && data.data.reply) || 'No response');
      } catch (err) {
        appendChat('assistant', `Request failed: ${err && err.message ? err.message : String(err)}`);
      } finally {
        chatState.sending = false;
        $('chatSendBtn').disabled = false;
      }
    }

    async function loadHtml() {
      const id = getCoursewareId();
      if (!id) {
        $('status').classList.add('warn');
        $('status').textContent = '缺少 courseware_id 参数';
        return;
      }

      $('meta').textContent = `courseware_id=${id}`;
      $('refreshBtn').disabled = true;
      $('status').classList.remove('warn');
      $('status').textContent = '正在生成并加载可交互 HTML...';

      try {
        const res = await fetch(`/api/v1/coursewares/${id}/html`);
        const data = await res.json();
        if (data.code !== 0) {
          $('status').classList.add('warn');
          $('status').textContent = `加载失败：${data.message}`;
          return;
        }
        $('viewer').srcdoc = (data.data && data.data.html) || '';
        $('status').textContent = '已加载，可直接在页面中交互学习。';
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        $('status').classList.add('warn');
        $('status').textContent = `加载失败：${msg}`;
      } finally {
        $('refreshBtn').disabled = false;
      }
    }

    $('backBtn').addEventListener('click', () => {
      location.href = '/';
    });

    $('refreshBtn').addEventListener('click', loadHtml);

    $('openTabBtn').addEventListener('click', () => {
      const id = getCoursewareId();
      if (!id) return;
      window.open(`/downloads/${encodeURIComponent(id)}.html}`, '_blank');
    });

    $('chatSendBtn').addEventListener('click', sendChat);
    $('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    $('newChatBtn').addEventListener('click', createNewChat);
    $('historyToggleBtn').addEventListener('click', toggleHistoryPanel);

    loadHtml();
    loadCoursewareInfo();  // Load courseware info including source_asset_ids
  </script>
</body>
</html>
